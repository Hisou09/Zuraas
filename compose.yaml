services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zuraas
      POSTGRES_USER: zuraas
      POSTGRES_PASSWORD: zuraas_dev
    ports:
      - "5432:5432"
    volumes:
      - zuraas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuraas -d zuraas"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  zuraas_postgres_data:
